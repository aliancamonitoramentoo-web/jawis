<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S — Sistema de Assistência Pessoal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --c:#00d4ff;--cg:#ffd700;--cr:#ff4444;--cgr:#00ff88;
  --bg:#000a18;--bg2:rgba(0,212,255,.05);--bd:rgba(0,212,255,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--c);
  background-image:
    radial-gradient(ellipse 60% 50% at 15% 50%,rgba(0,80,180,.1) 0%,transparent 100%),
    radial-gradient(ellipse 40% 60% at 85% 20%,rgba(0,180,255,.06) 0%,transparent 100%),
    repeating-linear-gradient(0deg,transparent,transparent 44px,rgba(0,212,255,.018) 44px,rgba(0,212,255,.018) 45px),
    repeating-linear-gradient(90deg,transparent,transparent 44px,rgba(0,212,255,.018) 44px,rgba(0,212,255,.018) 45px);
}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh}
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;border-bottom:1px solid var(--bd);
  background:rgba(0,2,12,.95);flex-shrink:0;
}
.logo{
  font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;letter-spacing:7px;
  background:linear-gradient(90deg,#00d4ff,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hdr-r{display:flex;gap:14px;align-items:center;font-family:'Orbitron',monospace;font-size:.62rem;letter-spacing:2px;color:rgba(0,212,255,.5)}
.dot{width:7px;height:7px;border-radius:50%;background:#444;transition:all .4s}
.dot.on{background:#00ff88;box-shadow:0 0 8px #00ff88}

/* PERMISSION BANNER */
#perm-banner{
  background:rgba(255,140,0,.08);border-bottom:2px solid rgba(255,140,0,.4);
  padding:10px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;
}
#perm-banner.hidden{display:none}
.perm-text{flex:1;font-size:.85rem;color:rgba(255,200,100,.85)}
#btn-perm{
  background:rgba(255,215,0,.15);border:1px solid #ffd700;color:#ffd700;
  font-family:'Orbitron',monospace;font-size:.58rem;letter-spacing:2px;
  padding:8px 16px;cursor:pointer;border-radius:2px;
}

/* WAKE BANNER */
#wake-banner{
  background:rgba(0,212,255,.04);border-bottom:1px solid rgba(0,212,255,.12);
  padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;
}
.wl{font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:2px;color:rgba(0,212,255,.5)}
#wake-inp{
  background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.28);color:white;
  font-family:'Rajdhani',sans-serif;font-size:.9rem;padding:5px 11px;outline:none;border-radius:2px;width:130px;
}
.btn-sm{
  padding:5px 11px;border:1px solid rgba(0,212,255,.3);background:transparent;
  color:rgba(0,212,255,.7);font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:2px;
  cursor:pointer;border-radius:2px;
}
.btn-sm:hover{border-color:var(--c);color:var(--c);background:rgba(0,212,255,.08)}

/* CONFIG BOX */
#config-box{padding:10px 16px;border-bottom:1px solid rgba(0,212,255,.1);background:rgba(0,212,255,.02)}
.config-label{font-family:'Orbitron',monospace;font-size:.5rem;color:rgba(0,212,255,.4);margin-bottom:4px;display:block}
.config-input{width:100%;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);color:white;font-size:.75rem;padding:4px 8px;outline:none;border-radius:2px}

/* BODY */
#body{flex:1;display:grid;grid-template-columns:300px 1fr 260px;overflow:hidden;min-height:0}

/* LEFT */
#left{border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
#tabs{display:flex;border-bottom:1px solid rgba(0,212,255,.12);flex-shrink:0}
.tab{flex:1;padding:10px 4px;background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(0,212,255,.32);font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.tab.on{color:var(--c);border-bottom-color:var(--c);background:rgba(0,212,255,.04)}
.panel{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin}

/* CENTER */
#center{display:flex;flex-direction:column;overflow:hidden}
#arc-zone{
  display:flex;flex-direction:column;align-items:center;
  padding:20px 16px 12px;border-bottom:1px solid rgba(0,212,255,.12);
  background:radial-gradient(ellipse at center,rgba(0,50,140,.07) 0%,transparent 70%);
  flex-shrink:0;
}
#arc{width:120px;height:120px;position:relative;cursor:pointer;margin-bottom:10px}
.ring{position:absolute;border-radius:50%;border:1.5px solid transparent;transition:border-color .6s}
#arc-core{
  position:absolute;inset:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:.48rem;letter-spacing:1px;color:white;
}
#waves{display:flex;gap:3px;height:32px;align-items:center;margin-bottom:7px}
.wb{width:3px;background:rgba(0,212,255,.35);border-radius:2px;height:3px}
#arc-label{font-family:'Orbitron',monospace;font-size:.54rem;letter-spacing:3px;color:rgba(0,212,255,.45);text-align:center}

/* CHAT */
#chat{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;animation:fadeIn .3s ease}
.msg.usr{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:.52rem;flex-shrink:0;border:1px solid rgba(0,212,255,.35);background:rgba(0,212,255,.04);color:var(--c)}
.msg.usr .av{border-color:rgba(255,215,0,.35);color:#ffd700}
.bubble{max-width:78%;padding:9px 12px;border-radius:2px;font-size:.88rem;line-height:1.55;color:rgba(255,255,255,.9)}
.bubble.bot{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.18);border-left:3px solid var(--c)}
.bubble.usr{background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.18);border-right:3px solid #ffd700;text-align:right}
.thinking{color:rgba(0,212,255,.4);font-style:italic}

/* INPUT */
#input-zone{padding:12px 16px;border-top:1px solid rgba(0,212,255,.13);display:flex;gap:8px;align-items:center;background:rgba(0,2,8,.8);flex-shrink:0}
#msg-input{flex:1;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.2);color:white;font-family:'Rajdhani',sans-serif;font-size:.9rem;padding:9px 12px;outline:none;border-radius:2px}

/* RIGHT */
#right{border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.panel-title{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:4px;color:rgba(0,212,255,.4);padding:11px 14px 8px;border-bottom:1px solid rgba(0,212,255,.08);display:flex;align-items:center;gap:7px}
#clock-box{padding:14px 16px;border-bottom:1px solid rgba(0,212,255,.1);text-align:center}
#clock{font-family:'Orbitron',monospace;font-size:1.8rem;letter-spacing:3px;color:var(--c)}
#log{flex:1;overflow-y:auto;padding:10px 14px;font-family:monospace;font-size:.62rem;color:rgba(0,212,255,.4);line-height:1.5}
.log-item{margin-bottom:4px;border-bottom:1px solid rgba(0,212,255,.03)}

/* ANIMATIONS */
@keyframes corePulse{from{transform:scale(1);opacity:.8}to{transform:scale(1.05);opacity:1}}
@keyframes wave{from{height:3px;opacity:.3}to{height:28px;opacity:1}}
@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* FORMS */
.fi{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(0,212,255,.2);color:white;font-family:'Rajdhani',sans-serif;font-size:.88rem;padding:6px 0;outline:none;margin-bottom:8px;display:block}
.btn-p{width:100%;padding:8px;border:1px solid rgba(0,212,255,.5);background:rgba(0,212,255,.1);color:var(--c);font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:2px;cursor:pointer;border-radius:2px;margin-top:4px}
.ti{background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.1);padding:9px 10px;margin-bottom:8px;border-radius:2px}
.mb{padding:3px 9px;border:1px solid rgba(0,212,255,.22);background:transparent;color:rgba(0,212,255,.6);font-family:'Orbitron',monospace;font-size:.48rem;letter-spacing:1px;cursor:pointer;border-radius:2px}
</style>
</head>
<body>

<div id="app">
  <header id="hdr">
    <div class="logo">J.A.R.V.I.S</div>
    <div class="hdr-r">
      <span id="hdr-clock">00:00:00</span>
      <span style="color:rgba(0,212,255,.2)">|</span>
      <span id="hdr-status">STANDBY</span>
      <div id="mic-dot" class="dot"></div>
    </div>
  </header>

  <div id="perm-banner">
    <div class="perm-text"><b>Microfone:</b> Clique em permitir para ativar a escuta contínua.</div>
    <button id="btn-perm" onclick="requestMic()">🔓 PERMITIR MIC</button>
  </div>

  <div id="wake-banner">
    <span class="wl">WAKE WORD:</span>
    <input type="text" id="wake-inp" maxlength="15">
    <button class="btn-sm" onclick="saveWake()">SALVAR</button>
    <div style="font-size:.7rem;color:rgba(0,212,255,.4);margin-left:10px">Diga "<b><span id="wake-show">JARVIS</span></b>"</div>
  </div>

  <div id="config-box">
    <span class="config-label">ANTHROPIC API KEY (2026 UPDATED):</span>
    <input type="password" id="api-key-inp" class="config-input" placeholder="Cole sua chave sk-ant-... aqui" onchange="saveApiKey()">
  </div>

  <main id="body">
    <section id="left">
      <div id="tabs">
        <button class="tab on" onclick="showTab('tasks',this)">Tarefas</button>
        <button class="tab" onclick="showTab('agenda',this)">Agenda</button>
      </div>
      <div id="tab-tasks" class="panel">
        <div style="background:rgba(0,212,255,.03);padding:10px;border:1px solid rgba(0,212,255,.1);margin-bottom:10px">
          <input type="text" id="t-title" class="fi" placeholder="Nova tarefa...">
          <button class="btn-p" onclick="addTask()">+ ADICIONAR</button>
        </div>
        <div id="task-list"></div>
      </div>
      <div id="tab-agenda" class="panel" style="display:none">
        <div id="agenda-list"></div>
      </div>
    </section>

    <section id="center">
      <div id="arc-zone">
        <div id="arc" onclick="manualWake()">
          <div id="r0" class="ring" style="inset:0;animation:rotate 4s linear infinite"></div>
          <div id="r1" class="ring" style="inset:12px;animation:rotate 8s linear reverse infinite"></div>
          <div id="r2" class="ring" style="inset:24px;animation:rotate 12s linear infinite"></div>
          <div id="arc-core">DORMIR</div>
        </div>
        <div id="waves">
          <div id="w0" class="wb"></div><div id="w1" class="wb"></div><div id="w2" class="wb"></div><div id="w3" class="wb"></div>
          <div id="w4" class="wb"></div><div id="w5" class="wb"></div><div id="w6" class="wb"></div><div id="w7" class="wb"></div>
        </div>
        <div id="arc-label">DIGA "JARVIS" PARA ATIVAR</div>
      </div>
      <div id="chat"></div>
      <div id="input-zone">
        <input type="text" id="msg-input" placeholder="Digite aqui..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="btn-sm" onclick="sendMsg()">ENVIAR</button>
      </div>
    </section>

    <section id="right">
      <div class="panel-title">SISTEMA</div>
      <div id="clock-box"><div id="clock">00:00:00</div></div>
      <div class="panel-title">LOG DE OPERAÇÕES</div>
      <div id="log"></div>
    </section>
  </main>
</div>

<script>
// ESTADO
var tasks    = JSON.parse(localStorage.getItem('jv_tasks')   || '[]');
var wakeWord = localStorage.getItem('jv_wake') || 'jarvis';
var apiKey   = localStorage.getItem('jv_apikey') || '';
var arcState = 'sleeping';
var micAllowed = false;
var recognition = null;
var chatHist = [];

// AUDIO SFX
var _actx = null;
function getActx() { if (!_actx) { try { _actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} } return _actx; }
function sfx(type) {
  var ctx = getActx(); if (!ctx) return;
  var plans = { wake:[[0,440,.1,.2],[150,660,.1,.2]], confirm:[[0,523,.1,.2],[120,659,.1,.2]], error:[[0,200,.1,.3]] };
  var pl = plans[type] || []; 
  pl.forEach(p => {
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = p[1];
    var st = ctx.currentTime + p[0]/1000;
    g.gain.setValueAtTime(p[2], st);
    g.gain.exponentialRampToValueAtTime(0.001, st + p[3]);
    o.start(st); o.stop(st + p[3] + 0.05);
  });
}

// TTS
function speak(text, cb) {
  if (!window.speechSynthesis) { if(cb) cb(); return; }
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text.slice(0,400));
  u.lang = 'pt-BR';
  if (cb) u.onend = cb;
  window.speechSynthesis.speak(u);
}

// ARC
function setArc(s) {
  arcState = s;
  var ARC = {
    sleeping: {label:'DORMIR', bg:'rgba(0,60,120,.5)', glow:'0 0 10px #00d4ff', pulse:false},
    listening:{label:'OUVINDO', bg:'rgba(255,0,0,.7)', glow:'0 0 20px #ff0000', pulse:true},
    thinking: {label:'PENSANDO', bg:'rgba(255,200,0,.7)', glow:'0 0 20px #ffd700', pulse:true},
    speaking: {label:'FALANDO', bg:'rgba(0,212,255,.8)', glow:'0 0 20px #00d4ff', pulse:true}
  };
  var m = ARC[s] || ARC.sleeping;
  var core = document.getElementById('arc-core');
  core.textContent = m.label;
  core.style.background = m.bg;
  core.style.boxShadow = m.glow;
  core.style.animation = m.pulse ? 'corePulse .6s infinite alternate' : 'none';
  document.getElementById('hdr-status').textContent = s.toUpperCase();
}

// API CALL (ATUALIZADA PARA CLAUDE 4 / SONNET 4.6 EM 2026)
async function callAI(text) {
  if (!apiKey) {
    addMsg('assistant', 'Senhor, a API Key não foi configurada.');
    setArc('sleeping');
    return;
  }

  chatHist.push({ role: 'user', content: text });
  if (chatHist.length > 10) chatHist = chatHist.slice(-10);

  var thinkId = 'think_' + Date.now();
  var chatEl = document.getElementById('chat');
  var td = document.createElement('div');
  td.className = 'msg'; td.id = thinkId;
  td.innerHTML = '<div class="av">JAR</div><div><div class="bubble bot thinking">Processando...</div></div>';
  chatEl.appendChild(td); chatEl.scrollTop = chatEl.scrollHeight;

  try {
    // Tenta usar o modelo mais novo (Sonnet 4.6) que é o padrão em 2026
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', // Modelo atualizado para 2026
        max_tokens: 1024,
        messages: chatHist
      })
    });

    var data = await response.json();
    
    if (!response.ok) {
      // Se der erro de modelo não encontrado, tenta o Haiku 4.5
      if (data.error && data.error.type === 'not_found_error') {
        addLog('Modelo Sonnet 4.6 não disponível. Tentando Haiku 4.5...');
        return callAI_Fallback(text, thinkId);
      }
      throw new Error(data.error ? data.error.message : 'Erro desconhecido');
    }

    handleAIResponse(data, thinkId);

  } catch(err) {
    cleanupAI(thinkId, err.message);
  }
}

async function callAI_Fallback(text, thinkId) {
  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5', // Modelo Haiku mais recente em 2026
        max_tokens: 1024,
        messages: chatHist
      })
    });
    var data = await response.json();
    if (!response.ok) throw new Error(data.error ? data.error.message : 'Erro no fallback');
    handleAIResponse(data, thinkId);
  } catch(err) {
    cleanupAI(thinkId, 'Erro definitivo: ' + err.message);
  }
}

function handleAIResponse(data, thinkId) {
  var reply = data.content[0].text;
  chatHist.push({ role: 'assistant', content: reply });
  var tEl = document.getElementById(thinkId);
  if(tEl) tEl.remove();
  addMsg('assistant', reply);
  sfx('confirm');
  setArc('speaking');
  speak(reply, () => setArc('sleeping'));
  addLog('IA respondeu com sucesso.');
}

function cleanupAI(thinkId, msg) {
  var tEl = document.getElementById(thinkId);
  if(tEl) tEl.remove();
  addMsg('assistant', 'Erro: ' + msg);
  addLog('ERRO: ' + msg);
  setArc('sleeping');
  sfx('error');
}

// MICROFONE E RECONHECIMENTO (PERSISTENTE)
function requestMic() {
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
      // Não paramos o stream para manter a permissão ativa em alguns navegadores
      micAllowed = true;
      document.getElementById('perm-banner').classList.add('hidden');
      document.getElementById('mic-dot').classList.add('on');
      startContinuousListen();
      addLog('Microfone autorizado.');
    })
    .catch(err => {
      addLog('Erro mic: ' + err.message);
      alert('Para o microfone funcionar sem pedir toda hora, você deve permitir no cadeado da barra de endereços.');
    });
}

function startContinuousListen() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { addLog('Navegador não suporta reconhecimento de voz.'); return; }
  
  if (recognition) recognition.stop();
  recognition = new SR();
  recognition.lang = 'pt-BR';
  recognition.continuous = true;
  recognition.interimResults = false;

  recognition.onresult = e => {
    var tr = e.results[e.results.length-1][0].transcript.toLowerCase().trim();
    addLog('Ouvi: ' + tr);
    if (tr.includes(wakeWord)) {
      var cmd = tr.split(wakeWord).pop().trim();
      if (cmd.length > 1) { 
        addMsg('user', cmd); 
        setArc('thinking'); 
        callAI(cmd); 
      } else { 
        sfx('wake'); 
        setArc('listening'); 
        speak('Sim, senhor?'); 
      }
    } else if (arcState === 'listening') {
      addMsg('user', tr); 
      setArc('thinking'); 
      callAI(tr);
    }
  };

  recognition.onend = () => {
    if (micAllowed) {
      setTimeout(() => { try { recognition.start(); } catch(e) {} }, 300);
    }
  };

  recognition.onerror = e => {
    if (e.error === 'no-speech') return;
    addLog('Erro reconhecimento: ' + e.error);
  };

  try { recognition.start(); } catch(e) {}
}

// UI
function addMsg(role, text) {
  var chat = document.getElementById('chat');
  var d = document.createElement('div');
  d.className = 'msg' + (role === 'user' ? ' usr' : '');
  d.innerHTML = '<div class="av">' + (role==='user'?'USR':'JAR') + '</div>'
    + '<div><div class="bubble ' + (role==='user'?'usr':'bot') + '">' + text + '</div></div>';
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function sendMsg() {
  var el = document.getElementById('msg-input');
  var t = el.value.trim(); if (!t) return;
  el.value = '';
  getActx();
  addMsg('user', t);
  setArc('thinking');
  callAI(t);
}

function saveApiKey() { apiKey = document.getElementById('api-key-inp').value.trim(); localStorage.setItem('jv_apikey', apiKey); addLog('API Key salva.'); }
function saveWake() { wakeWord = document.getElementById('wake-inp').value.trim().toLowerCase(); localStorage.setItem('jv_wake', wakeWord); document.getElementById('wake-show').textContent = wakeWord.toUpperCase(); addLog('Wake word salva.'); }
function manualWake() { getActx(); sfx('wake'); setArc('listening'); speak('Sim?'); }
function addTask() { var t = document.getElementById('t-title').value.trim(); if(!t) return; tasks.unshift({id:Date.now(), title:t, done:false}); save(); renderTasks(); document.getElementById('t-title').value=''; }
function renderTasks() { var el = document.getElementById('task-list'); el.innerHTML = tasks.map(t => `<div class="ti">${t.title} <button class="mb" onclick="delTask(${t.id})">✕</button></div>`).join(''); }
function delTask(id) { tasks = tasks.filter(x=>x.id!==id); save(); renderTasks(); }
function save() { localStorage.setItem('jv_tasks', JSON.stringify(tasks)); }
function showTab(n, b) { document.getElementById('tab-tasks').style.display = n==='tasks'?'block':'none'; document.getElementById('tab-agenda').style.display = n==='agenda'?'block':'none'; document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); b.classList.add('on'); }
function addLog(m) { var l = document.getElementById('log'); var d = document.createElement('div'); d.className='log-item'; d.textContent = new Date().toLocaleTimeString() + ' - ' + m; l.prepend(d); }

// INIT
(function init() {
  setInterval(() => { var t = new Date().toLocaleTimeString(); document.getElementById('hdr-clock').textContent = t; document.getElementById('clock').textContent = t; }, 1000);
  document.getElementById('wake-inp').value = wakeWord;
  document.getElementById('wake-show').textContent = wakeWord.toUpperCase();
  document.getElementById('api-key-inp').value = apiKey;
  renderTasks();
  addLog('JARVIS Online (Versão 2026).');
})();
